[package]
name = "core-crypto"
version = "0.1.0"
edition = "2021"
description = "Isogeny core cryptographic engine (ML-KEM + ChaCha20)"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
ml-kem = "0.2"
chacha20poly1305 = "0.10"
rand = "0.8"
getrandom = { version = "0.2", features = ["js"] }
